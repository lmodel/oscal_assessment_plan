    definition_uri: https://w3id.org/lmodel/oscal_assessment_plan/FindingTarget
    description: Captures an assessor's conclusions regarding the degree to which
      an objective is satisfied.
    in_subset:
    - assessment_common
    from_schema: https://w3id.org/lmodel/oscal_assessment_plan
    mixins:
    - OscalCommon
    slots:
    - FindingTarget_type
    - FindingTarget_target-id
    - title
    - description
    - implementation-status
    - FindingTarget_status
    - remarks
    - props
    - links
    slot_usage:
      type:
        name: type
        range: FindingTargetTypeEnum
        required: true
      target-id:
        name: target-id
        required: true
      status:
        name: status
        range: ObjectiveStatus
        required: true
        inlined: true
    class_uri: oscal_assessment_plan:FindingTarget
  ObjectiveStatus:
    name: ObjectiveStatus
    definition_uri: https://w3id.org/lmodel/oscal_assessment_plan/ObjectiveStatus
    description: A determination of if the objective is satisfied or not within a
      given system.
    in_subset:
    - assessment_common
    from_schema: https://w3id.org/lmodel/oscal_assessment_plan
    slots:
    - ObjectiveStatus_state
    - reason
    - remarks
    slot_usage:
      state:
        name: state
        description: An indication as to whether the objective is satisfied or not.
        range: ObjectiveStatusStateEnum
        required: true
    class_uri: oscal_assessment_plan:ObjectiveStatus
  RelatedObservation:
    name: RelatedObservation
    definition_uri: https://w3id.org/lmodel/oscal_assessment_plan/RelatedObservation
    description: Relates the identified element to a set of referenced observations.
    in_subset:
    - assessment_common
    from_schema: https://w3id.org/lmodel/oscal_assessment_plan
    slots:
    - RelatedObservation_observation-uuid
    - remarks
    slot_usage:
      observation-uuid:
        name: observation-uuid
        required: true
    class_uri: oscal_assessment_plan:RelatedObservation
  AssociatedRisk:
    name: AssociatedRisk
    definition_uri: https://w3id.org/lmodel/oscal_assessment_plan/AssociatedRisk
    description: Relates the finding to a set of referenced risks.
    in_subset:
    - assessment_common
    from_schema: https://w3id.org/lmodel/oscal_assessment_plan
    slots:
    - AssociatedRisk_risk-uuid
    - remarks
    slot_usage:
      risk-uuid:
        name: risk-uuid
        required: true
    class_uri: oscal_assessment_plan:AssociatedRisk
  Risk:
    name: Risk
    definition_uri: https://w3id.org/lmodel/oscal_assessment_plan/Risk
    description: An identified risk.
    in_subset:
    - assessment_common
    from_schema: https://w3id.org/lmodel/oscal_assessment_plan
    mixins:
    - HasPropsAndLinks
    slots:
    - Risk_uuid
    - Risk_title
    - Risk_description
    - Risk_statement
    - origins
    - threat-ids
    - characterizations
    - mitigating-factors
    - deadline
    - remediations
    - risk-log
    - related-observations
    - Risk_status
    - props
    - links
    slot_usage:
      uuid:
        name: uuid
        required: true
      title:
        name: title
        required: true
      description:
        name: description
        required: true
      statement:
        name: statement
        required: true
      status:
        name: status
        range: RiskStatusEnum
        required: true
    class_uri: oscal_assessment_plan:Risk
  ThreatId:
    name: ThreatId
    definition_uri: https://w3id.org/lmodel/oscal_assessment_plan/ThreatId
    description: A pointer, by ID, to an externally-defined threat.
    in_subset:
    - assessment_common
    from_schema: https://w3id.org/lmodel/oscal_assessment_plan
    slots:
    - href
    - ThreatId_system
    - ThreatId_id
    slot_usage:
      system:
        name: system
        description: Specifies the system or scheme from which the identifier originates.
        required: true
      id:
        name: id
        range: URIType
        required: true
    class_uri: oscal_assessment_plan:ThreatId
  Characterization:
    name: Characterization
    definition_uri: https://w3id.org/lmodel/oscal_assessment_plan/Characterization
    description: A collection of descriptive data about the containing object from
      a specific origin.
    in_subset:
    - assessment_common
    from_schema: https://w3id.org/lmodel/oscal_assessment_plan
    mixins:
    - HasPropsAndLinks
    slots:
    - Characterization_origin
    - Characterization_facets
    - props
    - links
    slot_usage:
      origin:
        name: origin
        required: true
      facets:
        name: facets
        required: true
    class_uri: oscal_assessment_plan:Characterization
  Facet:
    name: Facet
    definition_uri: https://w3id.org/lmodel/oscal_assessment_plan/Facet
    description: An individual characteristic that is part of a larger set produced
      by the same actor.
    in_subset:
    - assessment_common
    from_schema: https://w3id.org/lmodel/oscal_assessment_plan
    mixins:
    - OscalCommon
    slots:
    - Facet_name
    - Facet_value
    - Facet_system
    - remarks
    - props
    - links
    slot_usage:
      name:
        name: name
        required: true
      value:
        name: value
        required: true
      system:
        name: system
        description: Specifies the system or scheme from which the identifier originates.
        required: true
    class_uri: oscal_assessment_plan:Facet
  MitigatingFactor:
    name: MitigatingFactor
    definition_uri: https://w3id.org/lmodel/oscal_assessment_plan/MitigatingFactor
    description: Describes an existing mitigating factor that may affect the overall
      determination of the risk.
    in_subset:
    - assessment_common
    from_schema: https://w3id.org/lmodel/oscal_assessment_plan
    mixins:
    - HasPropsAndLinks
    slots:
    - MitigatingFactor_uuid
    - MitigatingFactor_description
    - implementation-uuid
    - MitigatingFactor_subjects
    - props
    - links
    slot_usage:
      uuid:
        name: uuid
        required: true
      description:
        name: description
        required: true
      subjects:
        name: subjects
        range: SubjectReference
    class_uri: oscal_assessment_plan:MitigatingFactor
  Response:
    name: Response
    definition_uri: https://w3id.org/lmodel/oscal_assessment_plan/Response
    description: Describes either recommended or an actual plan for addressing the
      risk.
    in_subset:
    - assessment_common
    from_schema: https://w3id.org/lmodel/oscal_assessment_plan
    mixins:
    - OscalCommon
    slots:
    - Response_uuid
    - Response_title
    - Response_description
    - Response_lifecycle
    - origins
    - required-assets
    - tasks
    - remarks
    - props
    - links
    slot_usage:
      uuid:
        name: uuid
        required: true
      title:
        name: title
        required: true
      description:
        name: description
        required: true
      lifecycle:
        name: lifecycle
        required: true
    class_uri: oscal_assessment_plan:Response
  RequiredAsset:
    name: RequiredAsset
    definition_uri: https://w3id.org/lmodel/oscal_assessment_plan/RequiredAsset
    description: Identifies an asset required to achieve remediation.
    in_subset:
    - assessment_common
    from_schema: https://w3id.org/lmodel/oscal_assessment_plan
    mixins:
    - OscalCommon
    slots:
    - RequiredAsset_uuid
    - title
    - RequiredAsset_description
    - RequiredAsset_subjects
    - remarks
    - props
    - links
    slot_usage:
      uuid:
        name: uuid
        required: true
      description:
        name: description
        required: true
      subjects:
        name: subjects
        range: SubjectReference
    class_uri: oscal_assessment_plan:RequiredAsset
  RiskLog:
    name: RiskLog
    definition_uri: https://w3id.org/lmodel/oscal_assessment_plan/RiskLog
    description: A log of all risk-related tasks taken.
    in_subset:
    - assessment_common
    from_schema: https://w3id.org/lmodel/oscal_assessment_plan
    slots:
    - RiskLog_entries
    slot_usage:
      entries:
        name: entries
        required: true
    class_uri: oscal_assessment_plan:RiskLog
  RiskLogEntry:
    name: RiskLogEntry
    definition_uri: https://w3id.org/lmodel/oscal_assessment_plan/RiskLogEntry
    description: Identifies an individual risk response that occurred as part of managing
      an identified risk.
    in_subset:
    - assessment_common
    from_schema: https://w3id.org/lmodel/oscal_assessment_plan
    mixins:
    - OscalCommon
    slots:
    - RiskLogEntry_uuid
    - title
    - description
    - RiskLogEntry_start
    - end
    - logged-by
    - status-change
    - related-responses
    - remarks
    - props
    - links
    slot_usage:
      uuid:
        name: uuid
        required: true
      start:
        name: start
        required: true
    class_uri: oscal_assessment_plan:RiskLogEntry
  LoggedBy:
    name: LoggedBy
    definition_uri: https://w3id.org/lmodel/oscal_assessment_plan/LoggedBy
    description: Used to indicate who created a log entry in what role.
    in_subset:
    - assessment_common
    from_schema: https://w3id.org/lmodel/oscal_assessment_plan
    slots:
    - LoggedBy_party-uuid
    - role-id
    - remarks
    slot_usage:
      party-uuid:
        name: party-uuid
        required: true
    class_uri: oscal_assessment_plan:LoggedBy
  RiskResponseReference:
    name: RiskResponseReference
    definition_uri: https://w3id.org/lmodel/oscal_assessment_plan/RiskResponseReference
    description: Identifies an individual risk response that this log entry is for.
    in_subset:
    - assessment_common
    from_schema: https://w3id.org/lmodel/oscal_assessment_plan
    mixins:
    - OscalCommon
    slots:
    - RiskResponseReference_response-uuid
    - related-tasks
    - remarks
    - props
    - links
    slot_usage:
      response-uuid:
        name: response-uuid
        required: true
    class_uri: oscal_assessment_plan:RiskResponseReference
  HasPropsAndLinks:
    name: HasPropsAndLinks
    definition_uri: https://w3id.org/lmodel/oscal_catalog/HasPropsAndLinks
    description: Mixin providing the props and links slots that are common to many
      OSCAL objects.
    from_schema: https://w3id.org/lmodel/oscal_catalog
    mixin: true
    slots:
    - props
    - links
    class_uri: oscal_catalog:HasPropsAndLinks
  OscalCommon:
    name: OscalCommon
    definition_uri: https://w3id.org/lmodel/oscal_catalog/OscalCommon
    description: Mixin providing props, links, and remarks slots common to most OSCAL
      objects. Extends HasPropsAndLinks.
    from_schema: https://w3id.org/lmodel/oscal_catalog
    mixin: true
    mixins:
    - HasPropsAndLinks
    slots:
    - remarks
    - props
    - links
    class_uri: oscal_catalog:OscalCommon
  HasResponsibleRoles:
    name: HasResponsibleRoles
    definition_uri: https://w3id.org/lmodel/oscal_catalog/HasResponsibleRoles
    description: Mixin providing the responsible-roles slot for objects that carry
      role assignments.
    from_schema: https://w3id.org/lmodel/oscal_catalog
    mixin: true
    slots:
    - responsible-roles
    class_uri: oscal_catalog:HasResponsibleRoles
  HasResponsibleParties:
    name: HasResponsibleParties
    definition_uri: https://w3id.org/lmodel/oscal_catalog/HasResponsibleParties
    description: Mixin providing the responsible-parties slot for objects that carry
      party assignments.
    from_schema: https://w3id.org/lmodel/oscal_catalog
    mixin: true
    slots:
    - responsible-parties
    class_uri: oscal_catalog:HasResponsibleParties
  OscalDocument:
    name: OscalDocument
    definition_uri: https://w3id.org/lmodel/oscal_catalog/OscalDocument
    description: A root wrapper for an OSCAL document, which may be of any OSCAL document
      type (e.g. Catalog, Profile, Assessment Plan, SSP).
    from_schema: https://w3id.org/lmodel/oscal_catalog
    class_uri: oscal_catalog:OscalDocument
    tree_root: true
  CatalogDocument:
    name: CatalogDocument
    definition_uri: https://w3id.org/lmodel/oscal_catalog/CatalogDocument
    description: Root wrapper for an OSCAL Catalog document.
    in_subset:
    - oscal_catalog
    from_schema: https://w3id.org/lmodel/oscal_catalog
    is_a: OscalDocument
    slots:
    - CatalogDocument_catalog
    slot_usage:
      catalog:
        name: catalog
        required: true
    class_uri: oscal_catalog:CatalogDocument
  Catalog:
    name: Catalog
    definition_uri: https://w3id.org/lmodel/oscal_catalog/Catalog
    description: A structured, organized collection of control information.
    in_subset:
    - oscal_catalog
    from_schema: https://w3id.org/lmodel/oscal_catalog
    slots:
    - Catalog_uuid
    - Catalog_metadata
    - back-matter
    - params
    - controls
    - groups
    slot_usage:
      uuid:
        name: uuid
        description: Provides a globally unique means to identify a given catalog
          instance.
        required: true
      metadata:
        name: metadata
        required: true
    class_uri: oscal_catalog:Catalog
  Group:
    name: Group
    definition_uri: https://w3id.org/lmodel/oscal_catalog/Group
    description: A group of controls, or of groups of controls.
    in_subset:
    - oscal_catalog
    from_schema: https://w3id.org/lmodel/oscal_catalog
    mixins:
    - OscalCommon
    slots:
    - Group_id
    - Group__class
    - Group_title
    - params
    - parts
    - groups
    - controls
    - remarks
    - props
    - links
    slot_usage:
      id:
        name: id
        description: Identifies the group for the purpose of cross-linking within
          the defining instance or from other instances that reference the catalog.
      _class:
        name: _class
        description: A textual label that provides a sub-type or characterization
          of the group.
      title:
        name: title
        description: A name given to the group, which may be used by a tool for display
          and navigation.
        required: true
    class_uri: oscal_catalog:Group
  Control:
    name: Control
    definition_uri: https://w3id.org/lmodel/oscal_catalog/Control
    description: A structured object representing a requirement or guideline, which
      when implemented will reduce an aspect of risk related to an information system
      and its information.
    in_subset:
    - oscal_catalog
    from_schema: https://w3id.org/lmodel/oscal_catalog
    mixins:
    - OscalCommon
    slots:
    - Control_id
    - Control__class
    - Control_title
    - params
    - parts
    - controls
    - remarks
    - props
    - links
    slot_usage:
      id:
        name: id
        description: Identifies a control such that it can be referenced in the defining
          catalog and other OSCAL instances (e.g., profiles).
        required: true
      _class:
        name: _class
        description: A textual label that provides a sub-type or characterization
          of the control.
      title:
        name: title
        description: A name given to the control, which may be used by a tool for
          display and navigation.
        required: true
    class_uri: oscal_catalog:Control
  Metadata:
    name: Metadata
    definition_uri: https://w3id.org/lmodel/oscal_catalog/Metadata
    description: Provides information about the containing document, and defines concepts
      shared across the document.
    in_subset:
    - oscal_metadata
    from_schema: https://w3id.org/lmodel/oscal_catalog
    mixins:
    - OscalCommon
    - HasResponsibleParties
    slots:
    - Metadata_title
    - published
    - Metadata_last-modified
    - Metadata_version
    - Metadata_oscal-version
    - document-ids
    - revisions
    - roles
    - locations
    - parties
    - actions
    - remarks
    - props
    - links
    - responsible-parties
    slot_usage:
      title:
        name: title
        description: A name given to the document.
        required: true
      last-modified:
        name: last-modified
        description: The date and time the document was last stored for later retrieval.
        required: true
      version:
        name: version
        description: Used to distinguish a specific revision of an OSCAL document.
        required: true
      oscal-version:
        name: oscal-version
        description: The OSCAL model version the document was authored against.
        required: true
    class_uri: oscal_catalog:Metadata
  Revision:
    name: Revision
    definition_uri: https://w3id.org/lmodel/oscal_catalog/Revision
    description: An entry in a sequential list of revisions to the containing document.
    in_subset:
    - oscal_metadata
    from_schema: https://w3id.org/lmodel/oscal_catalog
    mixins:
    - OscalCommon
    slots:
    - title
    - published
    - last-modified
    - Revision_version
    - oscal-version
    - remarks
    - props
    - links
    slot_usage:
      version:
        name: version
        required: true
    class_uri: oscal_catalog:Revision
  DocumentId:
    name: DocumentId
    definition_uri: https://w3id.org/lmodel/oscal_catalog/DocumentId
    description: A document identifier qualified by an identifier scheme.
    in_subset:
    - oscal_metadata
    from_schema: https://w3id.org/lmodel/oscal_catalog
    slots:
    - scheme
    - DocumentId_identifier
    slot_usage:
      identifier:
        name: identifier
        required: true
    class_uri: oscal_catalog:DocumentId
  Role:
    name: Role
    definition_uri: https://w3id.org/lmodel/oscal_catalog/Role
    description: Defines a function, which might be assigned to a party in a specific
      situation.
    in_subset:
    - oscal_metadata
    from_schema: https://w3id.org/lmodel/oscal_catalog
    mixins:
    - OscalCommon
    slots:
    - Role_id
    - Role_title
    - short-name
    - description
    - remarks
    - props
    - links
    slot_usage:
      id:
        name: id
        description: A unique identifier for the role.
        required: true
      title:
        name: title
        required: true
    class_uri: oscal_catalog:Role
  Location:
    name: Location
    definition_uri: https://w3id.org/lmodel/oscal_catalog/Location
    description: A physical point of presence, which may be associated with people,
      organizations, or other concepts within the current or linked OSCAL document.
    in_subset:
    - oscal_metadata
    from_schema: https://w3id.org/lmodel/oscal_catalog
    mixins:
    - OscalCommon
    slots:
    - Location_uuid
    - title
    - email-addresses
    - telephone-numbers
    - address
    - urls
    - remarks
    - props
    - links
    slot_usage:
      uuid:
        name: uuid
        required: true
    class_uri: oscal_catalog:Location
  Party:
    name: Party
    definition_uri: https://w3id.org/lmodel/oscal_catalog/Party
    description: An organization or person, which may be associated with roles or
      other concepts within the current or linked OSCAL document.
    in_subset:
    - oscal_metadata
    from_schema: https://w3id.org/lmodel/oscal_catalog
    mixins:
    - OscalCommon
    slots:
    - Party_uuid
    - Party_type
    - Party_name
    - short-name
    - email-addresses
    - telephone-numbers
    - external-ids
    - addresses
    - location-uuids
    - member-of-organizations
    - remarks
    - props
    - links
    slot_usage:
      uuid:
        name: uuid
        required: true
      type:
        name: type
        description: A category describing the kind of party the object describes.
        range: PartyTypeEnum
        required: true
      name:
        name: name
        description: The full name of the party.
        range: string
    class_uri: oscal_catalog:Party
  PartyExternalId:
    name: PartyExternalId
    definition_uri: https://w3id.org/lmodel/oscal_catalog/PartyExternalId
    description: An identifier for a person or organization using a designated scheme,
      e.g. an Open Researcher and Contributor ID (ORCID).
    in_subset:
    - oscal_metadata
    from_schema: https://w3id.org/lmodel/oscal_catalog
    slots:
    - PartyExternalId_scheme
    - PartyExternalId_id
    slot_usage:
      scheme:
        name: scheme
        description: Indicates the type of external identifier.
        required: true
      id:
        name: id
        range: string
        required: true
    class_uri: oscal_catalog:PartyExternalId
  ResponsibleParty:
    name: ResponsibleParty
    definition_uri: https://w3id.org/lmodel/oscal_catalog/ResponsibleParty
    description: A reference to a set of persons and/or organizations that have responsibility
      for performing the referenced role in the context of the containing object.
    in_subset:
    - oscal_metadata
    from_schema: https://w3id.org/lmodel/oscal_catalog
    mixins:
    - OscalCommon
    slots:
    - ResponsibleParty_role-id
    - ResponsibleParty_party-uuids
    - remarks
    - props
    - links
    slot_usage:
      role-id:
        name: role-id
        description: A reference to a role performed by a party.
        required: true
      party-uuids:
        name: party-uuids
        required: true
    class_uri: oscal_catalog:ResponsibleParty
  ResponsibleRole:
    name: ResponsibleRole
    definition_uri: https://w3id.org/lmodel/oscal_catalog/ResponsibleRole
    description: A reference to a role with responsibility for performing a function
      relative to the containing object, optionally associated with a set of persons
      and/or organizations that perform that role.
    in_subset:
    - oscal_metadata
    from_schema: https://w3id.org/lmodel/oscal_catalog
    mixins:
    - OscalCommon
    slots:
    - ResponsibleRole_role-id
    - party-uuids
    - remarks
    - props
    - links
    slot_usage:
      role-id:
        name: role-id
        description: A human-oriented identifier reference to a role performed.
        required: true
    class_uri: oscal_catalog:ResponsibleRole
  Action:
    name: Action
    definition_uri: https://w3id.org/lmodel/oscal_catalog/Action
    description: An action applied by a role within a given party to the content.
    in_subset:
    - oscal_metadata
    from_schema: https://w3id.org/lmodel/oscal_catalog
    mixins:
    - OscalCommon
    - HasResponsibleParties
    slots:
    - Action_uuid
    - Action_type
    - date
    - Action_system
    - remarks
    - props
    - links
    - responsible-parties
    slot_usage:
      uuid:
        name: uuid
        description: A unique identifier that can be used to reference this defined
          action elsewhere in an OSCAL document.
        required: true
      type:
        name: type
        description: The type of action documented by the assembly, such as an approval.
        range: TokenType
        required: true
      system:
        name: system
        required: true
    class_uri: oscal_catalog:Action
  TelephoneNumber:
    name: TelephoneNumber
    definition_uri: https://w3id.org/lmodel/oscal_catalog/TelephoneNumber
    description: A telephone service number as defined by ITU-T E.164.
    in_subset:
    - oscal_metadata
    from_schema: https://w3id.org/lmodel/oscal_catalog
    slots:
    - TelephoneNumber_type
    - TelephoneNumber_number
    slot_usage:
      type:
        name: type
        description: Indicates the type of phone number.
        range: PhoneTypeEnum
      number:
        name: number
        required: true
    class_uri: oscal_catalog:TelephoneNumber
  Address:
    name: Address
    definition_uri: https://w3id.org/lmodel/oscal_catalog/Address
    description: A postal address for the location.
    in_subset:
    - oscal_metadata
    from_schema: https://w3id.org/lmodel/oscal_catalog
    slots:
    - Address_type
    - addr-lines
    - city
    - state
    - postal-code
    - country
    slot_usage:
      type:
        name: type
        description: Indicates the type of address.
        range: AddressTypeEnum
    class_uri: oscal_catalog:Address
  Hash:
    name: Hash
    definition_uri: https://w3id.org/lmodel/oscal_catalog/Hash
    description: A representation of a cryptographic digest generated over a resource
      using a specified hash algorithm.
    in_subset:
    - oscal_metadata
    from_schema: https://w3id.org/lmodel/oscal_catalog
    slots:
    - Hash_value
    - Hash_algorithm
    slot_usage:
      value:
        name: value
        required: true
      algorithm:
        name: algorithm
        required: true
    class_uri: oscal_catalog:Hash
  Property:
    name: Property
    definition_uri: https://w3id.org/lmodel/oscal_catalog/Property
    description: An attribute, characteristic, or quality of the containing object
      expressed as a namespace qualified name/value pair.
    in_subset:
    - oscal_metadata
    from_schema: https://w3id.org/lmodel/oscal_catalog
    slots:
    - Property_name
    - Property_uuid
    - Property_ns
    - Property_value
    - Property__class
    - remarks
    - group
    slot_usage:
      name:
        name: name
