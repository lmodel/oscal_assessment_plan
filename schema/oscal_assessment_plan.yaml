name: oscal_assessment_plan
description: 'OSCAL Assessment Plan Model: LinkML Schema'
title: oscal_assessment_plan
source: https://pages.nist.gov/OSCAL-Reference/release-assets/latest/oscal_assessment-plan_schema.json
see_also:
- https://lmodel.github.io/oscal_assessment_plan
- https://pages.nist.gov/OSCAL/learn/concepts/layer/assessment/assessment-plan/
- https://medium.com/@gregelin/an-orientation-to-oscal-in-the-devsecops-pipeline-b51e45f8503b
id: https://w3id.org/lmodel/oscal_assessment_plan
imports:
- linkml:types
- ./oscal_catalog
license: Apache-2.0
prefixes:
  oscal_assessment_plan:
    prefix_prefix: oscal_assessment_plan
    prefix_reference: https://w3id.org/lmodel/oscal_assessment_plan/
  oscal_catalog:
    prefix_prefix: oscal_catalog
    prefix_reference: https://w3id.org/lmodel/oscal_catalog/
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
default_prefix: oscal_assessment_plan
default_range: string
subsets:
  assessment_plan:
    name: assessment_plan
    definition_uri: https://w3id.org/lmodel/oscal_assessment_plan/AssessmentPlan
    description: Classes that form the root Assessment Plan document and its direct
      structural containers (local-definitions, terms-and-conditions).
    from_schema: https://w3id.org/lmodel/oscal_assessment_plan
  assessment_common:
    name: assessment_common
    definition_uri: https://w3id.org/lmodel/oscal_assessment_plan/AssessmentCommon
    description: 'Classes originating from the oscal-assessment-common namespace:
      subjects, assets, activities, tasks, findings, observations, risks, and related
      helper types.'
    from_schema: https://w3id.org/lmodel/oscal_assessment_plan
  implementation_common:
    name: implementation_common
    definition_uri: https://w3id.org/lmodel/oscal_assessment_plan/ImplementationCommon
    description: 'Classes originating from the oscal-implementation-common namespace:
      system components, protocols, inventory items, users, and set-parameter.'
    from_schema: https://w3id.org/lmodel/oscal_assessment_plan
  oscal_catalog:
    name: oscal_catalog
    definition_uri: https://w3id.org/lmodel/oscal_catalog/OscalCatalog
    description: 'Classes originating from the oscal-catalog namespace: the root catalog
      document, groups, and controls.'
    from_schema: https://w3id.org/lmodel/oscal_catalog
  oscal_metadata:
    name: oscal_metadata
    definition_uri: https://w3id.org/lmodel/oscal_catalog/OscalMetadata
    description: 'Classes originating from the oscal-metadata namespace: document
      metadata, parties, roles, locations, and utility types such as Property, Link,
      and Hash.'
    from_schema: https://w3id.org/lmodel/oscal_catalog
  oscal_back_matter:
    name: oscal_back_matter
    definition_uri: https://w3id.org/lmodel/oscal_catalog/OscalBackMatter
    description: 'Classes originating from the oscal-metadata back-matter definition:
      back-matter container and its constituent resource types.'
    from_schema: https://w3id.org/lmodel/oscal_catalog
  oscal_control_common:
    name: oscal_control_common
    definition_uri: https://w3id.org/lmodel/oscal_catalog/OscalControlCommon
    description: 'Classes originating from the oscal-control-common namespace: parts,
      parameters, constraints, guidelines, selections, and control-matching helpers.'
    from_schema: https://w3id.org/lmodel/oscal_catalog
types:
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  UUIDType:
    name: UUIDType
    definition_uri: https://w3id.org/lmodel/oscal_catalog/UUIDType
    description: A type 4 or type 5 UUID per RFC 4122.
    from_schema: https://w3id.org/lmodel/oscal_catalog
    base: str
    uri: xsd:string
    pattern: ^[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[45][0-9A-Fa-f]{3}-[89ABab][0-9A-Fa-f]{3}-[0-9A-Fa-f]{12}$
  URIType:
    name: URIType
    definition_uri: https://w3id.org/lmodel/oscal_catalog/URIType
    description: A universal resource identifier formatted according to RFC3986.
    from_schema: https://w3id.org/lmodel/oscal_catalog
    base: str
    uri: xsd:anyURI
  URIReferenceType:
    name: URIReferenceType
    definition_uri: https://w3id.org/lmodel/oscal_catalog/URIReferenceType
    description: A URI Reference, either a URI or relative-reference, per RFC3986.
    from_schema: https://w3id.org/lmodel/oscal_catalog
    base: str
    uri: xsd:anyURI
  DateTimeWithTimezoneType:
    name: DateTimeWithTimezoneType
    definition_uri: https://w3id.org/lmodel/oscal_catalog/DateTimeWithTimezoneType
    description: A string representing a point in time with a required timezone.
    from_schema: https://w3id.org/lmodel/oscal_catalog
    base: str
    uri: xsd:dateTime
  MarkupLineType:
    name: MarkupLineType
    definition_uri: https://w3id.org/lmodel/oscal_catalog/MarkupLineType
    description: A single line of Markdown content (no newlines).
    from_schema: https://w3id.org/lmodel/oscal_catalog
    base: str
    uri: xsd:string
  MarkupMultilineType:
    name: MarkupMultilineType
    definition_uri: https://w3id.org/lmodel/oscal_catalog/MarkupMultilineType
    description: Multiple lines of Markdown content.
    from_schema: https://w3id.org/lmodel/oscal_catalog
    base: str
    uri: xsd:string
  TokenType:
    name: TokenType
    definition_uri: https://w3id.org/lmodel/oscal_catalog/TokenType
    description: A non-colonized XML NCName token.
    from_schema: https://w3id.org/lmodel/oscal_catalog
    base: str
    uri: xsd:string
  Base64Type:
    name: Base64Type
    definition_uri: https://w3id.org/lmodel/oscal_catalog/Base64Type
    description: Binary data encoded using Base64 as defined by RFC4648.
    from_schema: https://w3id.org/lmodel/oscal_catalog
    base: str
    uri: xsd:base64Binary
  EmailAddressType:
    name: EmailAddressType
    definition_uri: https://w3id.org/lmodel/oscal_catalog/EmailAddressType
    description: An email address string formatted according to RFC 6531.
    from_schema: https://w3id.org/lmodel/oscal_catalog
    base: str
    uri: xsd:string
    pattern: ^.+@.+$
