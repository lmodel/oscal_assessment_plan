    in_subset:
    - assessment_plan
    from_schema: https://w3id.org/lmodel/oscal_assessment_plan
    slots:
    - AssessmentPlan_uuid
    - AssessmentPlan_metadata
    - AssessmentPlan_import-ssp
    - local-definitions
    - terms-and-conditions
    - assessment-subjects
    - assessment-assets
    - AssessmentPlan_reviewed-controls
    - tasks
    - back-matter
    slot_usage:
      uuid:
        name: uuid
        description: Assessment Plan Universally Unique Identifier.
        required: true
      metadata:
        name: metadata
        required: true
      import-ssp:
        name: import-ssp
        required: true
      reviewed-controls:
        name: reviewed-controls
        required: true
    class_uri: oscal_assessment_plan:AssessmentPlan
