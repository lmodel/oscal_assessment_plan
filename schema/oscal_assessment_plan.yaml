  AssessmentPlanDocument:
    name: AssessmentPlanDocument
    definition_uri: https://w3id.org/lmodel/oscal_assessment_plan/AssessmentPlanDocument
    description: Root wrapper for an OSCAL Assessment Plan document.
    in_subset:
    - assessment_plan
    from_schema: https://w3id.org/lmodel/oscal_assessment_plan
    is_a: OscalDocument
    slots:
    - AssessmentPlanDocument_assessment-plan
    slot_usage:
