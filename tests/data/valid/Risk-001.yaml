title: "Audit Logging Disabled on Production Servers"
description: >-
  Audit logging is not enabled on three production servers, reducing
  the ability to detect and investigate unauthorized access.
statement: >-
  The organization must enable audit logging on all production servers
  in accordance with AU-2 and AU-12 control requirements.
